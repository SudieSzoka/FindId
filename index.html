<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel ID差异检测工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="icon" href="icon.png" type="image/x-icon">
    <style>
        .upload-area {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }

        .upload-area.dragover {
            border-color: #2563eb;
            background-color: #eff6ff;
        }

        .option-card {
            border: 1px solid #e5e7eb;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .option-card:has(input:checked) {
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.15);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100">
    <div class="mx-auto max-w-7xl px-4 py-8">
        <div class="mb-8 text-center">
            <h1 class="mb-2 text-3xl font-bold text-slate-800">Excel ID差异检测工具</h1>
            <p class="text-slate-600">对比新旧 Excel，检测缺失 ID、新增 ID、新增字段和内容变化</p>
        </div>

        <div class="mb-8 grid gap-6 md:grid-cols-2">
            <div class="rounded-xl bg-white p-6 shadow-sm">
                <h2 class="mb-4 text-xl font-semibold text-slate-800">新表文件夹</h2>
                <div class="upload-area cursor-pointer rounded-xl p-6 text-center"
                     id="newFilesArea"
                     ondrop="handleDrop(event, 'new')"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)">
                    <svg class="mx-auto mb-4 h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-slate-600">拖拽 Excel 文件到此处或点击选择</p>
                    <input type="file" id="newFilesInput" webkitdirectory directory multiple class="hidden">
                    <input type="file" id="newFilesInputFiles" multiple accept=".xlsx,.xls" class="hidden">
                    <div class="mt-3 space-x-2">
                        <button onclick="document.getElementById('newFilesInput').click()" class="text-sm text-blue-600 hover:text-blue-800">选择文件夹</button>
                        <span class="text-slate-400">或</span>
                        <button onclick="document.getElementById('newFilesInputFiles').click()" class="text-sm text-blue-600 hover:text-blue-800">选择文件</button>
                    </div>
                </div>
                <div id="newFilesCount" class="mt-4 text-sm text-slate-600">未选择文件</div>
            </div>

            <div class="rounded-xl bg-white p-6 shadow-sm">
                <h2 class="mb-4 text-xl font-semibold text-slate-800">旧表文件夹</h2>
                <div class="upload-area cursor-pointer rounded-xl p-6 text-center"
                     id="oldFilesArea"
                     ondrop="handleDrop(event, 'old')"
                     ondragover="handleDragOver(event)"
                     ondragleave="handleDragLeave(event)">
                    <svg class="mx-auto mb-4 h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-slate-600">拖拽 Excel 文件到此处或点击选择</p>
                    <input type="file" id="oldFilesInput" webkitdirectory directory multiple class="hidden">
                    <input type="file" id="oldFilesInputFiles" multiple accept=".xlsx,.xls" class="hidden">
                    <div class="mt-3 space-x-2">
                        <button onclick="document.getElementById('oldFilesInput').click()" class="text-sm text-blue-600 hover:text-blue-800">选择文件夹</button>
                        <span class="text-slate-400">或</span>
                        <button onclick="document.getElementById('oldFilesInputFiles').click()" class="text-sm text-blue-600 hover:text-blue-800">选择文件</button>
                    </div>
                </div>
                <div id="oldFilesCount" class="mt-4 text-sm text-slate-600">未选择文件</div>
            </div>
        </div>

        <div class="mb-8 rounded-xl bg-white p-6 shadow-sm">
            <h2 class="mb-5 text-xl font-semibold text-slate-800">分析配置</h2>

            <div class="mb-6 grid gap-4 md:grid-cols-2">
                <div>
                    <label for="includeKeywords" class="mb-2 block text-sm font-medium text-slate-700">指定表格</label>
                    <input id="includeKeywords"
                           type="text"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
                           placeholder="输入多个字符串，用英文逗号分隔">
                    <p class="mt-2 text-xs text-slate-500">文件名包含任一字符串时才会处理</p>
                </div>
                <div>
                    <label for="excludeKeywords" class="mb-2 block text-sm font-medium text-slate-700">排除内容</label>
                    <input id="excludeKeywords"
                           type="text"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200"
                           placeholder="输入多个字符串，用英文逗号分隔">
                    <p class="mt-2 text-xs text-slate-500">文件名包含任一字符串时会被忽略</p>
                </div>
            </div>

            <div>
                <div class="mb-3 text-sm font-medium text-slate-700">分析项</div>
                <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-4">
                    <label class="option-card flex cursor-pointer items-start gap-3 rounded-xl p-4">
                        <input id="checkMissingId" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-slate-800">缺失 ID</div>
                            <div class="text-sm text-slate-500">旧表有、新表没有的 ID</div>
                        </div>
                    </label>
                    <label class="option-card flex cursor-pointer items-start gap-3 rounded-xl p-4">
                        <input id="checkNewField" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-slate-800">新增字段</div>
                            <div class="text-sm text-slate-500">每个表第一个有效 Sheet 的新增有效字段</div>
                        </div>
                    </label>
                    <label class="option-card flex cursor-pointer items-start gap-3 rounded-xl p-4">
                        <input id="checkNewId" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-slate-800">新增 ID</div>
                            <div class="text-sm text-slate-500">新表有、旧表没有的 ID</div>
                        </div>
                    </label>
                    <label class="option-card flex cursor-pointer items-start gap-3 rounded-xl p-4">
                        <input id="checkChangedContent" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                        <div>
                            <div class="font-medium text-slate-800">变化内容</div>
                            <div class="text-sm text-slate-500">同表同 Sheet 同 ID 的字段值变化</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <div class="mb-8 text-center">
            <button id="analyzeBtn"
                    onclick="analyzeFiles()"
                    class="rounded-xl bg-blue-600 px-8 py-3 font-semibold text-white shadow-sm transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50">
                <svg class="mr-2 inline-block h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                开始分析
            </button>
        </div>

        <div id="results" class="hidden space-y-6">
            <div class="rounded-xl bg-white p-6 shadow-sm">
                <h2 class="mb-4 text-xl font-semibold text-slate-800">分析结果</h2>
                <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-6">
                    <div class="rounded-xl bg-slate-100 p-4">
                        <div class="text-sm font-medium text-slate-600">处理表格</div>
                        <div id="processedTableCount" class="mt-2 text-2xl font-bold text-slate-900">0</div>
                    </div>
                    <div class="rounded-xl bg-emerald-50 p-4">
                        <div class="text-sm font-medium text-emerald-700">新增表格</div>
                        <div id="newTableCount" class="mt-2 text-2xl font-bold text-emerald-800">0</div>
                    </div>
                    <div class="rounded-xl bg-blue-50 p-4">
                        <div class="text-sm font-medium text-blue-700">缺失 ID</div>
                        <div id="missingIdCount" class="mt-2 text-2xl font-bold text-blue-800">0</div>
                    </div>
                    <div class="rounded-xl bg-cyan-50 p-4">
                        <div class="text-sm font-medium text-cyan-700">新增 ID</div>
                        <div id="newIdCount" class="mt-2 text-2xl font-bold text-cyan-800">0</div>
                    </div>
                    <div class="rounded-xl bg-amber-50 p-4">
                        <div class="text-sm font-medium text-amber-700">新增字段</div>
                        <div id="newFieldCount" class="mt-2 text-2xl font-bold text-amber-800">0</div>
                    </div>
                    <div class="rounded-xl bg-rose-50 p-4">
                        <div class="text-sm font-medium text-rose-700">变化内容</div>
                        <div id="changedContentCount" class="mt-2 text-2xl font-bold text-rose-800">0</div>
                    </div>
                </div>
            </div>

            <div class="rounded-xl bg-white p-6 shadow-sm">
                <div class="mb-2 text-center text-sm text-slate-500">结果会按类型分别写入不同 Sheet</div>
                <div class="text-center">
                    <button onclick="downloadResults()"
                            class="rounded-xl bg-emerald-600 px-6 py-3 font-semibold text-white shadow-sm transition hover:bg-emerald-700">
                        <svg class="mr-2 inline-block h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        下载 Excel 报告
                    </button>
                </div>
            </div>
        </div>

        <div id="progress" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
            <div class="mx-4 w-full max-w-md rounded-xl bg-white p-6">
                <div class="text-center">
                    <div class="mx-auto mb-4 h-12 w-12 animate-spin rounded-full border-b-2 border-blue-600"></div>
                    <p class="font-semibold text-slate-800">正在分析文件...</p>
                    <p id="progressText" class="mt-2 text-sm text-slate-500">请稍候</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'findid.settings.v2';
        const FIELD_ROW_INDEX = 4;

        let newFiles = {};
        let oldFiles = {};
        let analysisResult = createEmptyResult();

        document.getElementById('newFilesInput').addEventListener('change', (event) => handleFileSelect(event, 'new'));
        document.getElementById('newFilesInputFiles').addEventListener('change', (event) => handleFileSelect(event, 'new'));
        document.getElementById('oldFilesInput').addEventListener('change', (event) => handleFileSelect(event, 'old'));
        document.getElementById('oldFilesInputFiles').addEventListener('change', (event) => handleFileSelect(event, 'old'));

        bindSettingsPersistence();
        restoreSettings();

        function createEmptyResult() {
            return {
                processedTables: 0,
                newTables: [],
                missingIds: [],
                newIds: [],
                newFields: [],
                changedContents: []
            };
        }

        function bindSettingsPersistence() {
            [
                'includeKeywords',
                'excludeKeywords',
                'checkMissingId',
                'checkNewField',
                'checkNewId',
                'checkChangedContent'
            ].forEach((id) => {
                document.getElementById(id).addEventListener('input', saveSettings);
                document.getElementById(id).addEventListener('change', saveSettings);
            });
        }

        function restoreSettings() {
            let settings = getDefaultSettings();

            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    settings = {
                        ...settings,
                        ...JSON.parse(raw)
                    };
                }
            } catch (error) {
                console.warn('读取本地配置失败，已恢复默认配置。', error);
            }

            document.getElementById('includeKeywords').value = settings.includeKeywords || '';
            document.getElementById('excludeKeywords').value = settings.excludeKeywords || '';
            document.getElementById('checkMissingId').checked = settings.checkMissingId;
            document.getElementById('checkNewField').checked = settings.checkNewField;
            document.getElementById('checkNewId').checked = settings.checkNewId;
            document.getElementById('checkChangedContent').checked = settings.checkChangedContent;
        }

        function saveSettings() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(getCurrentSettings()));
        }

        function getDefaultSettings() {
            return {
                includeKeywords: '',
                excludeKeywords: '',
                checkMissingId: true,
                checkNewField: true,
                checkNewId: true,
                checkChangedContent: true
            };
        }

        function getCurrentSettings() {
            return {
                includeKeywords: document.getElementById('includeKeywords').value.trim(),
                excludeKeywords: document.getElementById('excludeKeywords').value.trim(),
                checkMissingId: document.getElementById('checkMissingId').checked,
                checkNewField: document.getElementById('checkNewField').checked,
                checkNewId: document.getElementById('checkNewId').checked,
                checkChangedContent: document.getElementById('checkChangedContent').checked
            };
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
        }

        function handleDrop(event, type) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            processFiles(event.dataTransfer.files, type);
        }

        function handleFileSelect(event, type) {
            processFiles(event.target.files, type);
            event.target.value = '';
        }

        function processFiles(files, type) {
            const targetStore = type === 'new' ? newFiles : oldFiles;
            const countContainer = document.getElementById(type + 'FilesCount');

            Object.keys(targetStore).forEach((key) => delete targetStore[key]);

            let excelCount = 0;
            for (const file of files) {
                if (!isExcelFile(file.name)) {
                    continue;
                }

                targetStore[file.name] = file;
                excelCount++;
            }

            updateFileCount(countContainer, excelCount);
        }

        function updateFileCount(container, count) {
            container.textContent = count > 0 ? `已选择 ${count} 个 Excel 文件` : '未选择文件';
        }

        function isExcelFile(fileName) {
            const lowerName = fileName.toLowerCase();
            return lowerName.endsWith('.xlsx') || lowerName.endsWith('.xls');
        }

        async function analyzeFiles() {
            if (Object.keys(newFiles).length === 0 || Object.keys(oldFiles).length === 0) {
                alert('请先选择新表和旧表文件。');
                return;
            }

            saveSettings();
            analysisResult = createEmptyResult();
            document.getElementById('progress').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            try {
                await performAnalysis();
                document.getElementById('results').classList.remove('hidden');
            } catch (error) {
                console.error('分析过程中出错:', error);
                alert(`分析过程中出错：${error.message || '请检查文件格式是否正确'}`);
            } finally {
                document.getElementById('progress').classList.add('hidden');
            }
        }

        async function performAnalysis() {
            const settings = getCurrentSettings();
            const includeKeywords = parseKeywordInput(settings.includeKeywords);
            const excludeKeywords = parseKeywordInput(settings.excludeKeywords);

            const filteredNewFileNames = Object.keys(newFiles).filter((fileName) => shouldProcessFile(fileName, includeKeywords, excludeKeywords));
            const filteredOldFileNames = Object.keys(oldFiles).filter((fileName) => shouldProcessFile(fileName, includeKeywords, excludeKeywords));
            const oldFileNameSet = new Set(filteredOldFileNames);

            analysisResult.newTables = filteredNewFileNames
                .filter((fileName) => !oldFileNameSet.has(fileName))
                .map((fileName) => ({
                    '表格名': stripExtension(fileName)
                }));

            const filesToAnalyze = filteredNewFileNames.filter((fileName) => oldFileNameSet.has(fileName));
            analysisResult.processedTables = filesToAnalyze.length;

            for (let index = 0; index < filesToAnalyze.length; index++) {
                const fileName = filesToAnalyze[index];
                document.getElementById('progressText').textContent = `正在分析: ${fileName} (${index + 1}/${filesToAnalyze.length})`;

                const [newWorkbookData, oldWorkbookData] = await Promise.all([
                    parseWorkbook(newFiles[fileName]),
                    parseWorkbook(oldFiles[fileName])
                ]);

                compareWorkbookData(fileName, newWorkbookData, oldWorkbookData, settings);
            }

            updateResultStats();
        }

        function parseKeywordInput(value) {
            return value
                .split(',')
                .map((item) => item.trim())
                .filter(Boolean);
        }

        function shouldProcessFile(fileName, includeKeywords, excludeKeywords) {
            const lowerName = fileName.toLowerCase();

            if (includeKeywords.length > 0 && !includeKeywords.some((keyword) => lowerName.includes(keyword.toLowerCase()))) {
                return false;
            }

            if (excludeKeywords.length > 0 && excludeKeywords.some((keyword) => lowerName.includes(keyword.toLowerCase()))) {
                return false;
            }

            return true;
        }

        async function parseWorkbook(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();

                reader.onload = (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheets = new Map();
                        let firstValidSheet = null;

                        for (const sheetName of workbook.SheetNames) {
                            if (sheetName.startsWith('$')) {
                                continue;
                            }

                            const parsedSheet = parseWorksheet(workbook.Sheets[sheetName], sheetName);
                            if (!parsedSheet) {
                                continue;
                            }

                            sheets.set(sheetName, parsedSheet);
                            if (!firstValidSheet) {
                                firstValidSheet = parsedSheet;
                            }
                        }

                        resolve({
                            sheets,
                            firstValidSheet
                        });
                    } catch (error) {
                        reject(error);
                    }
                };

                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function parseWorksheet(worksheet, sheetName) {
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
            if (rows.length <= FIELD_ROW_INDEX) {
                return null;
            }

            const headerRow = rows[FIELD_ROW_INDEX] || [];
            const fields = [];
            let idColumnIndex = -1;

            for (let columnIndex = 0; columnIndex < headerRow.length; columnIndex++) {
                const fieldName = normalizeFieldName(headerRow[columnIndex]);
                if (!fieldName || fieldName.startsWith('$')) {
                    continue;
                }

                const isId = isIdField(fieldName);
                if (isId) {
                    idColumnIndex = columnIndex;
                }

                fields.push({
                    index: columnIndex,
                    name: fieldName,
                    isId
                });
            }

            if (idColumnIndex === -1 || fields.length === 0) {
                return null;
            }

            const startRowIndex = findMarkerRow(rows, 'Start');
            const endRowIndex = startRowIndex === -1 ? -1 : findMarkerRow(rows, 'End', startRowIndex + 1);
            if (startRowIndex === -1 || endRowIndex === -1 || endRowIndex <= startRowIndex) {
                return null;
            }

            const rowsById = new Map();

            for (let rowIndex = startRowIndex + 1; rowIndex < endRowIndex; rowIndex++) {
                const row = rows[rowIndex] || [];
                const id = normalizeCellValue(row[idColumnIndex]);
                if (!id) {
                    continue;
                }

                const values = {};
                fields.forEach((field) => {
                    values[field.name] = normalizeCellValue(row[field.index]);
                });

                rowsById.set(id, {
                    id,
                    values
                });
            }

            return {
                sheetName,
                fields,
                comparableFields: fields.filter((field) => !field.isId).map((field) => field.name),
                rowsById
            };
        }

        function findMarkerRow(rows, marker, startIndex = FIELD_ROW_INDEX + 1) {
            for (let index = startIndex; index < rows.length; index++) {
                const firstCell = normalizeCellValue((rows[index] || [])[0]);
                if (firstCell === marker) {
                    return index;
                }
            }

            return -1;
        }

        function normalizeFieldName(value) {
            return normalizeCellValue(value);
        }

        function normalizeCellValue(value) {
            if (value === undefined || value === null) {
                return '';
            }

            return String(value).trim();
        }

        function isIdField(fieldName) {
            return fieldName.toLowerCase() === 'id';
        }

        function compareWorkbookData(fileName, newWorkbookData, oldWorkbookData, settings) {
            if (settings.checkNewField && newWorkbookData.firstValidSheet && oldWorkbookData.firstValidSheet) {
                const oldFieldSet = new Set(oldWorkbookData.firstValidSheet.comparableFields);
                newWorkbookData.firstValidSheet.comparableFields.forEach((fieldName) => {
                    if (oldFieldSet.has(fieldName)) {
                        return;
                    }

                    analysisResult.newFields.push({
                        '表格名': stripExtension(fileName),
                        'Sheet名': newWorkbookData.firstValidSheet.sheetName,
                        '字段名': fieldName
                    });
                });
            }

            const allSheetNames = new Set([
                ...newWorkbookData.sheets.keys(),
                ...oldWorkbookData.sheets.keys()
            ]);

            allSheetNames.forEach((sheetName) => {
                const newSheetData = newWorkbookData.sheets.get(sheetName);
                const oldSheetData = oldWorkbookData.sheets.get(sheetName);

                if (settings.checkMissingId) {
                    collectMissingIds(fileName, sheetName, oldSheetData, newSheetData);
                }

                if (settings.checkNewId) {
                    collectNewIds(fileName, sheetName, oldSheetData, newSheetData);
                }

                if (settings.checkChangedContent && oldSheetData && newSheetData) {
                    collectChangedContents(fileName, sheetName, oldSheetData, newSheetData);
                }
            });
        }

        function collectMissingIds(fileName, sheetName, oldSheetData, newSheetData) {
            if (!oldSheetData) {
                return;
            }

            const newIdSet = newSheetData ? new Set(newSheetData.rowsById.keys()) : new Set();
            oldSheetData.rowsById.forEach((_, id) => {
                if (newIdSet.has(id)) {
                    return;
                }

                analysisResult.missingIds.push({
                    '表格名': stripExtension(fileName),
                    'Sheet名': sheetName,
                    'ID': id
                });
            });
        }

        function collectNewIds(fileName, sheetName, oldSheetData, newSheetData) {
            if (!newSheetData) {
                return;
            }

            const oldIdSet = oldSheetData ? new Set(oldSheetData.rowsById.keys()) : new Set();
            newSheetData.rowsById.forEach((_, id) => {
                if (oldIdSet.has(id)) {
                    return;
                }

                analysisResult.newIds.push({
                    '表格名': stripExtension(fileName),
                    'Sheet名': sheetName,
                    'ID': id
                });
            });
        }

        function collectChangedContents(fileName, sheetName, oldSheetData, newSheetData) {
            const newFieldSet = new Set(newSheetData.comparableFields);
            const comparableFields = oldSheetData.comparableFields.filter((fieldName) => newFieldSet.has(fieldName));

            oldSheetData.rowsById.forEach((oldRecord, id) => {
                const newRecord = newSheetData.rowsById.get(id);
                if (!newRecord) {
                    return;
                }

                comparableFields.forEach((fieldName) => {
                    const oldValue = normalizeCellValue(oldRecord.values[fieldName]);
                    const newValue = normalizeCellValue(newRecord.values[fieldName]);

                    if (oldValue === newValue) {
                        return;
                    }

                    analysisResult.changedContents.push({
                        '表格名': stripExtension(fileName),
                        'Sheet名': sheetName,
                        'ID': id,
                        '字段名': fieldName,
                        '旧值': oldValue,
                        '新值': newValue
                    });
                });
            });
        }

        function updateResultStats() {
            document.getElementById('processedTableCount').textContent = analysisResult.processedTables;
            document.getElementById('newTableCount').textContent = analysisResult.newTables.length;
            document.getElementById('missingIdCount').textContent = analysisResult.missingIds.length;
            document.getElementById('newIdCount').textContent = analysisResult.newIds.length;
            document.getElementById('newFieldCount').textContent = analysisResult.newFields.length;
            document.getElementById('changedContentCount').textContent = analysisResult.changedContents.length;
        }

        function downloadResults() {
            const workbook = XLSX.utils.book_new();
            let hasData = false;

            hasData = appendSheetIfHasData(workbook, analysisResult.newTables, '新增表格') || hasData;
            hasData = appendSheetIfHasData(workbook, analysisResult.missingIds, '缺失ID') || hasData;
            hasData = appendSheetIfHasData(workbook, analysisResult.newIds, '新增ID') || hasData;
            hasData = appendSheetIfHasData(workbook, analysisResult.newFields, '新增字段') || hasData;
            hasData = appendSheetIfHasData(workbook, analysisResult.changedContents, '变化内容') || hasData;

            if (!hasData) {
                alert('没有可下载的数据。');
                return;
            }

            XLSX.writeFile(workbook, `${getTodayString()}_Excel差异报告.xlsx`);
        }

        function appendSheetIfHasData(workbook, data, sheetName) {
            if (!data || data.length === 0) {
                return false;
            }

            const worksheet = XLSX.utils.json_to_sheet(data);
            XLSX.utils.book_append_sheet(workbook, worksheet, sheetName);
            return true;
        }

        function stripExtension(fileName) {
            return fileName.replace(/\.(xlsx|xls)$/i, '');
        }

        function getTodayString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
    </script>
</body>
